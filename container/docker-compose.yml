version: '3.8'

services:
  statesync:
    image: ghcr.io/ubermetroid/statesync:latest
    container_name: statesync
    restart: unless-stopped
    # Binds to 0.0.0.0 by default — accessible on the LAN.
    # For loopback-only, change to "127.0.0.1:8754:8754"
    ports:
      - "8754:8754"
    volumes:
      - ./config:/config
    environment:
      - RUST_LOG=info
      - TZ=UTC
      # Optional bearer-token auth for the web UI:
      # - STATESYNC_WEB_AUTH=bearer:replace-with-`openssl rand -hex 32`