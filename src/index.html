<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>statesync dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f19;
      --panel: rgba(30, 41, 59, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --primary: linear-gradient(135deg, #6366f1, #a855f7);
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
    }
    .container {
      max-width: 800px;
      width: 100%;
    }
    h1 {
      font-size: 32px;
      font-weight: 600;
      background: var(--primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0 0 10px 0;
    }
    .subtitle {
      color: var(--text-muted);
      margin-bottom: 40px;
      font-size: 16px;
    }
    .card {
      background: var(--panel);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    h2 {
      font-size: 20px;
      margin-top: 0;
      margin-bottom: 20px;
      font-weight: 600;
    }
    .server-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .server-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 23, 42, 0.4);
      padding: 16px 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      transition: transform 0.2s;
    }
    .server-row:hover {
      transform: translateY(-2px);
    }
    .server-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 10px #10b981;
    }
    .server-name {
      font-weight: 600;
    }
    .server-type {
      background: rgba(99, 102, 241, 0.2);
      color: #a5b4fc;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .server-stats {
      font-size: 13px;
      color: var(--text-muted);
    }
    .btn {
      background: var(--primary);
      border: none;
      color: white;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    .btn-danger {
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 8px 16px;
      border-radius: 8px;
    }
    .btn-danger:hover {
      background: #ef4444;
      color: white;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .form-group-full {
      grid-column: span 2;
    }
    label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 600;
    }
    input, select {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border);
      color: white;
      padding: 12px;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus {
      border-color: #6366f1;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1e293b;
      border: 1px solid var(--border);
      padding: 16px 24px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      display: none;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { transform: translateY(100px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>statesync</h1>
    <div class="subtitle">Real-time bi-directional playstate synchronization</div>

    <!-- Active Servers Card -->
    <div class="card">
      <h2>Active Servers</h2>
      <div class="server-list" id="serverList">
        <div style="color: var(--text-muted)">Loading active servers...</div>
      </div>
    </div>

    <!-- Add Server Card -->
    <div class="card">
      <h2>Add Media Server</h2>
      <form id="serverForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="serverType">Server Type</label>
            <select id="serverType">
              <option value="jellyfin">Jellyfin</option>
              <option value="emby">Emby</option>
            </select>
          </div>
          <div class="form-group">
            <label for="serverName">Friendly Name</label>
            <input type="text" id="serverName" placeholder="e.g. Living Room TV" required>
          </div>
          <div class="form-group form-group-full">
            <label for="serverUrl">Server URL (IP and Port)</label>
            <input type="url" id="serverUrl" placeholder="http://192.168.3.10:8096" required>
          </div>
          <div class="form-group form-group-full">
            <label for="serverKey">API Key</label>
            <input type="text" id="serverKey" placeholder="Enter server API key" required>
          </div>
        </div>
        <button type="submit" class="btn">Add Server</button>
      </form>
    </div>

    <!-- Global settings card -->
    <div class="card">
      <h2>Global Settings</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="syncThreshold">Sync Position Threshold (seconds)</label>
          <input type="number" id="syncThreshold" value="5" min="1">
        </div>
      </div>
      <button class="btn" onclick="saveSettings()">Save Settings</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let currentConfig = { servers: [], sync_threshold_seconds: 5 };

    async function loadDashboard() {
      try {
        const [configRes, statusRes] = await Promise.all([
          fetch('/api/config'),
          fetch('/api/status')
        ]);
        currentConfig = await configRes.json();
        const status = await statusRes.json();

        document.getElementById('syncThreshold').value = currentConfig.sync_threshold_seconds;
        
        const listDiv = document.getElementById('serverList');
        if (currentConfig.servers.length === 0) {
          listDiv.innerHTML = '<div style="color: var(--text-muted)">No media servers configured. Add one below!</div>';
          return;
        }

        listDiv.innerHTML = '';
        currentConfig.servers.forEach((srv, idx) => {
          const sStatus = status.servers.find(s => s.name === srv.name) || { users_count: 0, media_count: 0 };
          const row = document.createElement('div');
          row.className = 'server-row';
          row.innerHTML = `
            <div class="server-info">
              <div class="status-dot"></div>
              <div>
                <div style="display: flex; align-items: center; gap: 8px">
                  <span class="server-name">${srv.name}</span>
                  <span class="server-type">${srv.is_emby ? 'emby' : 'jellyfin'}</span>
                </div>
                <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px">${srv.url}</div>
              </div>
            </div>
            <div class="server-info">
              <span class="server-stats">${sStatus.users_count} users | ${sStatus.media_count} items</span>
              <button class="btn btn-danger" onclick="deleteServer(${idx})">Delete</button>
            </div>
          `;
          listDiv.appendChild(row);
        });
      } catch (err) {
        showToast('Error loading dashboard data');
      }
    }

    document.getElementById('serverForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const type = document.getElementById('serverType').value;
      const name = document.getElementById('serverName').value;
      const url = document.getElementById('serverUrl').value;
      const api_key = document.getElementById('serverKey').value;

      currentConfig.servers.push({
        name,
        url,
        api_key,
        is_emby: type === 'emby'
      });

      await saveConfig();
      document.getElementById('serverForm').reset();
    });

    async function deleteServer(idx) {
      currentConfig.servers.splice(idx, 1);
      await saveConfig();
    }

    async function saveSettings() {
      currentConfig.sync_threshold_seconds = parseInt(document.getElementById('syncThreshold').value);
      await saveConfig();
    }

    async function saveConfig() {
      try {
        const res = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(currentConfig)
        });
        const result = await res.json();
        showToast(result.message);
        setTimeout(loadDashboard, 1500);
      } catch (err) {
        showToast('Failed to update configuration');
      }
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.innerText = msg;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 4000);
    }

    loadDashboard();
  </script>
</body>
</html>
